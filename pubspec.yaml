name: gestura
description: Gestura - Accessibility Communication App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Speech recognition (on-device)
  speech_to_text: ^7.0.0

  # Text to speech (on-device)
  flutter_tts: ^4.0.2

  # Camera access
  camera: ^0.10.6

  # File picker for audio/video import
  file_picker: ^8.3.7

  # Runtime permissions
  permission_handler: ^11.3.1

  # Local file system paths
  path_provider: ^2.1.3

  # On-device TFLite inference for ASL sign detection
  tflite_flutter: ^0.11.0

  # Image processing to convert camera frames for the model
  image: ^4.1.7

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/